# docker-compose.yml — Juste des Ventilateurs
# Lance le superviseur ML en parallèle de jumeaux-chauds.
# jumeaux-chauds doit être lancé séparément (même hôte ou réseau partagé).

services:
  supervisor:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      # Sur Docker Desktop Windows, network_mode:host est ignore.
      # host.docker.internal pointe vers l'hote Windows (jumeaux-chauds API + MQTT).
      - API_BASE_URL=http://host.docker.internal:8000
      # Broker MQTT de jumeaux-chauds
      - MQTT_BROKER_HOST=host.docker.internal
      - MQTT_BROKER_PORT=1883
      # Identifiant du cluster (doit correspondre aux topics MQTT de jumeaux-chauds)
      - CLUSTER_ID=cluster_alpha
      - MQTT_TOPIC_ROOT=dt
      # Sous-echantillonnage : decision toutes les N secondes simulees
      - DECISION_INTERVAL_TICKS=5
      # Intervalle REST fallback (si MQTT indisponible)
      - DECISION_INTERVAL_S=5
      # Seuils de log et de risque
      - RISK_LOG_THRESHOLD=0.05
      - RISK_THRESHOLD=0.6
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./supervisor/logs:/app/supervisor/logs
    restart: "no"
    command: python -m supervisor.supervisor

  # Service optionnel : collecte continue en arrière-plan
  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./data:/app/data
    network_mode: host
    profiles: [ingest]
    command: python -m ingest.mqtt_subscriber --continuous

volumes: {}
