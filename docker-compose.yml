# docker-compose.yml — Juste des Ventilateurs
# Lance le superviseur ML en parallèle de jumeaux-chauds.
# jumeaux-chauds doit être lancé séparément (même hôte ou réseau partagé).

services:
  supervisor:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      # Sur Docker Desktop Windows, network_mode:host est ignore.
      # host.docker.internal pointe vers l'hote Windows (jumeaux-chauds API).
      - API_BASE_URL=http://host.docker.internal:8000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./supervisor/logs:/app/supervisor/logs
    restart: "no"
    command: python -m supervisor.supervisor

  # Service optionnel : collecte continue en arrière-plan
  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./data:/app/data
    network_mode: host
    profiles: [ingest]
    command: python -m ingest.mqtt_subscriber --continuous

volumes: {}
